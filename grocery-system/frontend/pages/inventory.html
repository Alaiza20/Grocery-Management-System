<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Ś Grocery MS</title>
    <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('gms-theme')||'dark'); })();</script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
    <style>
        .stock-low { color: var(--red); font-weight: 600; }
        .stock-ok { color: var(--accent); font-weight: 600; }
        .summary-card { border-radius: var(--radius); padding: 16px 20px; color: white; text-align: center; }
        .summary-card .number { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; }
        .summary-card .label { font-size: 0.85rem; opacity: 0.9; }
    </style>
</head>
<body>

<div id="gms-navbar"></div>

<div class="page-wrap">
    <div class="page-header animate-in">
        <h4><i class="bi bi-box-seam"></i> Inventory</h4>
        <p>Track stock levels and manage restocking thresholds</p>
    </div>

    <!-- Summary Cards -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">
        <div class="summary-card g-card" style="background: linear-gradient(135deg, var(--accent), var(--accent-dim));">
            <div class="number" id="totalProducts">Ś</div>
            <div class="label"><i class="bi bi-box-seam"></i> Total Products</div>
        </div>
        <div class="summary-card g-card" style="background: linear-gradient(135deg, var(--red), #ef4444);">
            <div class="number" id="lowStockCount">Ś</div>
            <div class="label"><i class="bi bi-exclamation-triangle"></i> Low Stock</div>
        </div>
        <div class="summary-card g-card" style="background: linear-gradient(135deg, var(--blue), #3b82f6);">
            <div class="number" id="healthyStockCount">Ś</div>
            <div class="label"><i class="bi bi-check-circle"></i> Healthy</div>
        </div>
        <div class="summary-card g-card" style="background: linear-gradient(135deg, var(--gold), #f59e0b);">
            <div class="number" id="reorderCount">Ś</div>
            <div class="label"><i class="bi bi-truck"></i> Reorder Needed</div>
        </div>
    </div>

    <div id="alertBox" class="gms-alert d-none"></div>

    <!-- Main Table -->
    <div class="g-card animate-in">
        <div class="g-card-header">
            <div class="g-card-title"><i class="bi bi-table"></i> Stock Levels</div>
            <span class="gms-badge badge-neutral" id="totalCount">0 records</span>
        </div>
        <div style="overflow-x:auto">
            <table class="g-table">
                <thead>
                    <tr>
                        <th style="width:60px">ID</th>
                        <th>Product Name</th>
                        <th>Unit</th>
                        <th>Stock</th>
                        <th>Min Level</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    <tr><td colspan="6"><div class="empty-state">
                        <i class="bi bi-hourglass-split"></i><p>Loading...</p>
                    </div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/navbar.js"></script>
<script>
    const API_BASE = 'http://localhost:5000/api';

    async function init() {
        await requireAuth();
        buildNavbar('inventory');
        await loadInventory();
    }

    async function loadInventory() {
        try {
            const res = await fetch(`${API_BASE}/inventory/`);
            const inventory = await res.json();
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = '';
            document.getElementById('totalCount').textContent = `${inventory.length} records`;

            let lowStock = 0, healthyStock = 0, reorderNeeded = 0;

            if (inventory.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="bi bi-inbox"></i><p>No inventory data</p></div></td></tr>';
                updateSummary(inventory.length, lowStock, healthyStock, reorderNeeded);
                return;
            }

            inventory.forEach(item => {
                const isLow = item.quantity < item.min_stock_level;
                const isReorder = item.quantity <= (item.reorder_point || 10);
                
                if (isLow) lowStock++;
                if (!isLow && item.quantity >= item.min_stock_level) healthyStock++;
                if (isReorder) reorderNeeded++;

                let statusBadge = 'pill-paid';
                let statusText = 'Healthy';
                if (isLow) {
                    statusBadge = 'badge-danger';
                    statusText = 'Low';
                } else if (isReorder) {
                    statusBadge = 'badge-warning';
                    statusText = 'Reorder';
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="badge-id">#${item.product_id}</span></td>
                    <td>${item.product_name}</td>
                    <td>${item.uom_name}</td>
                    <td><strong>${item.quantity}</strong></td>
                    <td>${item.min_stock_level}</td>
                    <td><span class="gms-badge ${statusBadge}">${statusText}</span></td>
                `;
                if (isLow) row.style.background = 'var(--accent-glow)';
                tbody.appendChild(row);
            });

            updateSummary(inventory.length, lowStock, healthyStock, reorderNeeded);
        } catch (e) {
            showAlert('Failed to load inventory', 'danger');
        }
    }

    function updateSummary(total, low, healthy, reorder) {
        document.getElementById('totalProducts').textContent = total;
        document.getElementById('lowStockCount').textContent = low;
        document.getElementById('healthyStockCount').textContent = healthy;
        document.getElementById('reorderCount').textContent = reorder;
    }

    function showAlert(msg, type = 'info') {
        const box = document.getElementById('alertBox');
        box.className = `gms-alert ${type} animate-in`;
        box.innerHTML = `<i class="bi bi-info-circle"></i> ${msg}`;
        box.classList.remove('d-none');
        setTimeout(() => box.classList.add('d-none'), 3000);
    }

    window.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
