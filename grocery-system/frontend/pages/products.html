<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — Grocery MS</title>
    <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('gms-theme')||'dark'); })();</script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>

<div id="gms-navbar"></div>

<div class="page-wrap">
    <div class="page-header animate-in">
        <h4><i class="bi bi-box-seam"></i> Products</h4>
        <p>Manage your grocery product catalogue — prices, units and suppliers</p>
    </div>

    <div id="alertBox" class="gms-alert d-none"></div>

    <div class="two-col">

        <!-- TABLE -->
        <div class="g-card animate-in">
            <div class="g-card-header">
                <div class="g-card-title"><i class="bi bi-table"></i> All Products</div>
                <span class="gms-badge badge-neutral" id="totalCount">0 records</span>
            </div>
            <div style="overflow-x:auto">
                <table class="g-table">
                    <thead>
                        <tr>
                            <th style="width:60px">ID</th>
                            <th>Product Name</th>
                            <th>Unit</th>
                            <th>Supplier</th>
                            <th>Price</th>
                            <th style="width:100px">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <tr><td colspan="6"><div class="empty-state">
                            <i class="bi bi-hourglass-split"></i><p>Loading...</p>
                        </div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- FORM -->
        <div>
            <div class="g-card animate-in">
                <div class="g-card-header">
                    <div class="g-card-title" id="formTitle">
                        <i class="bi bi-plus-circle"></i> Add New Product
                    </div>
                    <button class="gms-btn gms-btn-ghost gms-btn-sm d-none" id="cancelBtn" onclick="resetForm()">
                        <i class="bi bi-x"></i> Cancel
                    </button>
                </div>
                <div class="g-card-body">
                    <input type="hidden" id="productId">

                    <div class="form-group">
                        <label class="gms-label">Product Name <span style="color:var(--red)">*</span></label>
                        <input type="text" class="gms-input" id="productName"
                            placeholder="e.g. Basmati Rice" maxlength="150">
                    </div>

                    <div class="form-group">
                        <label class="gms-label">Unit of Measure <span style="color:var(--red)">*</span></label>
                        <select class="gms-input gms-select" id="productUom">
                            <option value="">-- Select Unit --</option>
                        </select>
                        <span class="gms-hint">
                            Can't find the unit?
                            <a href="uom.html" target="_blank" style="color:var(--accent)">Add it in UOM page</a>
                        </span>
                    </div>

                    <div class="form-group">
                        <label class="gms-label">Supplier</label>
                        <select class="gms-input gms-select" id="productSupplier">
                            <option value="">-- Select Supplier (optional) --</option>
                        </select>
                        <span class="gms-hint">
                            Can't find the supplier?
                            <a href="suppliers.html" target="_blank" style="color:var(--accent)">Add it in Suppliers page</a>
                        </span>
                    </div>

                    <div class="form-group">
                        <label class="gms-label">Price per Unit (PKR) <span style="color:var(--red)">*</span></label>
                        <div class="gms-input-group">
                            <span class="input-prefix">PKR</span>
                            <input type="number" class="gms-input" id="productPrice"
                                placeholder="0.00" min="0" step="0.01">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="gms-label">Description</label>
                        <textarea class="gms-input gms-textarea" id="productDescription"
                            rows="2" placeholder="Optional product details"></textarea>
                    </div>

                    <button class="gms-btn gms-btn-primary gms-btn-full" id="submitBtn" onclick="submitForm()">
                        <i class="bi bi-check-circle"></i> Save Product
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/navbar.js"></script>
<script>
    const API_BASE = 'http://localhost:5000/api';

    async function init() {
        await requireAuth();
        buildNavbar('products');
        await loadDropdowns();
        await loadProducts();
    }

    async function loadDropdowns() {
        try {
            const [uoms, suppliers] = await Promise.all([
                fetch(`${API_BASE}/uom/`).then(r => r.json()),
                fetch(`${API_BASE}/suppliers/`).then(r => r.json())
            ]);
            const uomSel = document.getElementById('productUom');
            uoms.forEach(u => {
                const o = document.createElement('option');
                o.value = u.uom_id; o.textContent = u.uom_name;
                uomSel.appendChild(o);
            });
            const supSel = document.getElementById('productSupplier');
            suppliers.forEach(s => {
                const o = document.createElement('option');
                o.value = s.supplier_id; o.textContent = s.name;
                supSel.appendChild(o);
            });
        } catch(e) { showAlert('Could not load dropdowns.', 'danger'); }
    }

    async function loadProducts() {
        try {
            const res  = await fetch(`${API_BASE}/products/`);
            const data = await res.json();
            renderTable(data);
        } catch(e) { showAlert('Failed to load. Make sure Flask is running.', 'danger'); }
    }

    function renderTable(data) {
        document.getElementById('totalCount').textContent = `${data.length} records`;
        const tbody = document.getElementById('productsTableBody');
        if (!data.length) {
            tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="bi bi-inbox"></i><p>No products yet. Add your first one.</p></div></td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(p => `
            <tr>
                <td><span class="badge-id">#${p.product_id}</span></td>
                <td>
                    <strong style="color:var(--text-pri)">${p.product_name}</strong>
                    ${p.description ? `<br><small style="color:var(--text-muted)">${p.description}</small>` : ''}
                </td>
                <td><span class="gms-badge badge-success">${p.uom?.uom_name || '—'}</span></td>
                <td><small style="color:var(--text-muted)">${p.suppliers?.name || '—'}</small></td>
                <td><strong style="color:var(--accent)">PKR ${parseFloat(p.price_per_unit).toFixed(2)}</strong></td>
                <td>
                    <button class="gms-btn gms-btn-ghost gms-btn-sm gms-btn-icon"
                        style="margin-right:4px"
                        onclick='editProduct(${JSON.stringify(p)})' title="Edit">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="gms-btn gms-btn-danger gms-btn-sm gms-btn-icon"
                        onclick="deleteProduct(${p.product_id},'${escapeQ(p.product_name)}')" title="Delete">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>`).join('');
    }

    async function submitForm() {
        const id          = document.getElementById('productId').value;
        const name        = document.getElementById('productName').value.trim();
        const uom_id      = document.getElementById('productUom').value;
        const supplier_id = document.getElementById('productSupplier').value;
        const price       = document.getElementById('productPrice').value;
        const description = document.getElementById('productDescription').value.trim();

        if (!name)  { showAlert('Product name is required.', 'warning'); return; }
        if (!uom_id){ showAlert('Please select a unit of measure.', 'warning'); return; }
        if (!price || parseFloat(price) < 0) { showAlert('Please enter a valid price.', 'warning'); return; }

        const payload = {
            product_name:   name,
            uom_id:         parseInt(uom_id),
            price_per_unit: parseFloat(price),
            description
        };
        if (supplier_id) payload.supplier_id = parseInt(supplier_id);

        try {
            const res = await fetch(id ? `${API_BASE}/products/${id}` : `${API_BASE}/products/`, {
                method: id ? 'PUT' : 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                showAlert(id ? 'Product updated.' : 'Product added.', 'success');
                resetForm(); loadProducts();
            } else {
                const e = await res.json();
                showAlert(e.error || 'Something went wrong.', 'danger');
            }
        } catch(e) { showAlert('Cannot connect to server.', 'danger'); }
    }

    function editProduct(p) {
        document.getElementById('productId').value          = p.product_id;
        document.getElementById('productName').value        = p.product_name;
        document.getElementById('productUom').value         = p.uom_id;
        document.getElementById('productSupplier').value    = p.supplier_id || '';
        document.getElementById('productPrice').value       = p.price_per_unit;
        document.getElementById('productDescription').value = p.description || '';
        document.getElementById('formTitle').innerHTML  = `<i class="bi bi-pencil" style="color:var(--gold)"></i> Edit Product`;
        document.getElementById('submitBtn').className  = 'gms-btn gms-btn-warning gms-btn-full';
        document.getElementById('submitBtn').innerHTML  = `<i class="bi bi-check-circle"></i> Update Product`;
        document.getElementById('cancelBtn').classList.remove('d-none');
        document.getElementById('productName').focus();
    }

    async function deleteProduct(id, name) {
        if (!confirm(`Delete "${name}"?`)) return;
        try {
            const res = await fetch(`${API_BASE}/products/${id}`, {method:'DELETE'});
            if (res.ok) { showAlert(`"${name}" deleted.`, 'success'); loadProducts(); }
            else showAlert('Cannot delete — product may be linked to orders.', 'danger');
        } catch(e) { showAlert('Cannot connect to server.', 'danger'); }
    }

    function resetForm() {
        ['productId','productName','productPrice','productDescription'].forEach(id => {
            const el = document.getElementById(id); if (el) el.value = '';
        });
        document.getElementById('productUom').value      = '';
        document.getElementById('productSupplier').value = '';
        document.getElementById('formTitle').innerHTML   = `<i class="bi bi-plus-circle"></i> Add New Product`;
        document.getElementById('submitBtn').className   = 'gms-btn gms-btn-primary gms-btn-full';
        document.getElementById('submitBtn').innerHTML   = `<i class="bi bi-check-circle"></i> Save Product`;
        document.getElementById('cancelBtn').classList.add('d-none');
    }

    function showAlert(msg, type) {
        const icons = {success:'check-circle', warning:'exclamation-triangle', danger:'x-circle', info:'info-circle'};
        const box = document.getElementById('alertBox');
        box.className = `gms-alert ${type}`;
        box.innerHTML = `<i class="bi bi-${icons[type]||'info-circle'}"></i> ${msg}`;
        box.classList.remove('d-none');
        setTimeout(() => box.classList.add('d-none'), 4000);
    }

    function escapeQ(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

    init();
</script>
</body>
</html>
